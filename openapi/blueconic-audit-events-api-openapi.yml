servers:
- url: https://{blueconicHostname}/rest/v2
  description: The BlueConic server
  variables:
    blueconicHostname:
      description: BlueConic server hostname, e.g. 'tenant.blueconic.net'
      default: tenantname
tags:
- name: Audit Events
  description: "The Audit Event API allows users to connect BlueConic to a SIEM system. We recommend using this API to periodically receive security-related activities based on a rolling window. The API has a 30-day retention period.\n\nThe API logs the following audit events:\n\n| Object                     | Events                                                                                         |\n|:---------------------------|:-----------------------------------------------------------------------------------------------|\n| BlueConic hostname         | Create, Update, Delete                                                                         |\n| BlueConic Support Access   | Update (for each change)                                                                       |\n| Channel                    | Create, Update, Delete                                                                         |\n| Clean up rule              | Create, Update, Delete                                                                         |\n| Connection                 | Create, Update, Delete, Manual run, Scheduled run                                              |\n| Dashboard                  | Create, Update, Delete                                                                         |\n| Dialogue                   | Create, Update, Delete                                                                         |\n| Domain Group               | Create, Update, Delete                                                                         |\n| Gen AI Setting             | Update (for each change)                                                                       |\n| Group                      | Read, Update, Delete                                                                           |\n| Group type                 | Create, Update, Delete                                                                         |\n| Ip range                   | Create, Update, Delete                                                                         |\n| Language                   | Create, Update, Delete                                                                         |\n| Lifecycle                  | Create, Update, Delete                                                                         |\n| Merge rule                 | Create, Update, Delete                                                                         |\n| Models                     | Create, Update, Delete                                                                         |\n| Notebook                   | Create, Update, Delete, Manual run, Scheduled run, Editor run                                  |\n| OAuth application          | Create, Update, Delete                                                                         |\n| OAuth token                | Create, Update, Delete                                                                         |\n| Objective                  | Create, Update, Delete                                                                         |\n| Plugin                     | Create, Update, Delete                                                                         |\n| Privacy setting            | Update (for each change)                                                                       |\n| Profile                    | Read, Update, Delete                                                                           |\n| Profile property           | Create, Update, Delete                                                                         |\n| Role                       | Create, Update, Delete                                                                         |\n| Segment                    | Create, Update, Delete                                                                         |\n| Single Sign On Setting     | Update (for each change)                                                                       |\n| Inactvity Setting          | Update (for each change)                                                                       |\n| Supported Legislation Zone | Create, Delete, Update                                                                         |\n| Timeline Event Rollup      | Create, Update, Delete                                                                         |\n| Timeline Event Type        | Create, Update, Delete                                                                         |\n| Tracker                    | Create, Update, Delete                                                                         |\n| User                       | Login, Login failed, Logout, Create, Update, Delete, Password reset requested, Password change |\n\n\nOnly Profile and Group viewed, updated, or deleted by a user from the Profile and Groups tab are logged.\n\nThe following events are not considered as human actions, and therefore not covered in the Platform\nAudit Event API:\n\n- Connections that import or export profiles.\n- Profile and group creation (Profiles can only be created by a visitor or an import connection).\n\n**Event data**\n\nThe following event data is available:\n\n| Field                  | Description      | Example values                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         |\n| :---                   | :---             |:-----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n|date|Datetime in UTC when the event occurred. The date is in the https://www.ietf.org/rfc/rfc3339.txt format.| 2025-04-15T11:24:01.183Z                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               |\n|username|(BlueConic) Identifier (email address) of the user who did the action.<br /><br />Value is empty for failed login attempts.| test@blueconic.com                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     |\n|objectType|Object of the action.| <ul><li>BLUECONIC_HOSTNAME</li><li>BLUECONIC_SUPPORT_ACCESS_SETTING</li><li>CHANNEL</li><li>CLEAN_UP_RULE</li><li>CONNECTION</li><li>DASHBOARD</li><li>DIALOGUE</li><li>DOMAIN_GROUP</li><li>GEN_AI_SETTING</li><li>GROUP</li><li>GROUP_TYPE</li><li>IP_RANGE</li><li>LANGUAGE</li><li>LIFECYCLE</li><li>LISTENER</li><li>MERGE_RULE</li><li>NOTEBOOK</li><li>OBJECTIVE</li><li>PLUGIN</li><li>PRIVACY_SETTING</li><li>PROFILE</li><li>PROFILE_PROPERTY</li><li>ROLE</li><li>SEGMENT</li><li>SINGLE_SIGN_ON_SETTING</li><li>SUPPORTED_LEGISLATION_ZONE</li><li>TRACKER</li><li>USER</li></ul> |\n|objectId|<ul><li>Email address in case of a user. <ul><li>In the case of LOGIN_FAILED and a user tried to login with an invalid format email address, it could be that the user filled the password in the email address field. In that case the objectId is empty</li></ul></li><li>Grouptype_GroupID in case of a group</li><li> For PRIVACY_SETTING and SINGLE_SIGN_ON_SETTING, the objectId is the name(s) of the changed setting. E.g. Status, Identity_Provider_Issuer_URL_Entity_ID.</li><li> For BLUECONIC_SUPPORT_ACCESS_SETTING the objectID contains the new settings.<ul><li> `\"objects\" : [ {\"name\" : \"No Access\", \"id\" : \"none\" } ]` or </li><li>`\"objects\" : [ {\"name\" : \"User name here\", \"id\" : \"user1@blueconic.com\" },{\"name\" : \"User name 2 here\", \"id\" : \"user2@blueconic.com\" }], (contains the new list)` or</li><li>`\"objects\" : [ {\"name\" : \"All BlueConic support employees\", \"id\" : \"all\" } ],`</li></ul></li><li>UUID or identifier in case of other object types.</li></ul>| <ul><li>1b1e50a5-c46a-4309-a95c-d4e19985fbbb</li><li>test@blueconic.com</li><li>test_objective</li><li>test_profile_property</li></ul>                                                                                                                                                                                                                                                                                                                                                                                                                                 |\n|objectName|<p>Human readable name of the object.</p><p>For Profiles, the name is determined by the first value that is not empty:</p><ol><li>fullname</li><li>email</li><li>BlueConic ID (UUID)</li></ol><p>For Users, the name is determined by the first value that is not empty:</p><ol><li>fullname</li><li>email</li></ol><ul><li>In the case of LOGIN_FAILED and a user tried to login with an invalid format email address, it could be that the user filled the password in the email address field. In that case, the objectName is empty.</li></ul><p>For groups, the name is the group id.</p><p><span>For PRIVACY_SETTING and SINGLE_SIGN_ON_SETTING, the objectName is the name(s) of the changed setting. E.g. Status, Identity_Provider_Issuer_URL_Entity_ID.</span></p><p>For BLUECONIC_SUPPORT_ACCESS_SETTING the objectName contains the new settings.</p><ul><li><p>`\"objects\" : [ {\"name\" : \"No Access\", \"id\" : \"none\" } ]` or</p></li><li ><p> `\"objects\" : [ {\"name\" : \"User name here\", \"id\" : \"user1@blueconic.com\" },{\"name\" : \"User name 2 here\", \"id\" : \"user2@blueconic.com\" }],` (contains the new list) or</p></li><li><p>`\"objects\" : [ {\"name\" : \"All BlueConic support employees\", \"id\" : \"all\" } ],`</p></li></ul>| <ul><li>SFTP connection</li><li>test@blueconic.om</li><li>Keyword Interest Ranking</li>                                                                                                                                                                                                                                                                                                                                                                                                                                                                                |\n|operation| Action performed on the object.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         | <ul><li>CREATE</li><li>UPDATE</li><li>DELETE</li><li>EDITOR_RUN</li><li>READ</li><li>LOGIN</li><li>LOGIN_FAILED</li><li>LOGOUT</li><li>MANUAL_RUN</li><li>PASSWORD_RESET_REQUESTED</li><li>PASSWORD_CHANGE</li><li>SCHEDULED_RUN</li></ul>                                                                                                                                                                                                                                                                                                                             \n|ipAddress| The source IP address from which the event was triggered.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               | 192.168.1.100                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          |\n|application| The application that performed the audit event operation.                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                | blueconic                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              |\n\n"
paths:
  /auditEvents:
    get:
      tags:
      - Audit Events
      summary: Get audit events
      description: Retrieves the audit events.
      operationId: getAuditEvents
      parameters:
      - name: fromDate
        in: query
        description: Only return entries that are created later than this date. The fromDate is in the ISO 8601 format (e.g. '2025-01-22T11:21:33.872Z').
        schema:
          type: string
        example: 2025-01-22 11:21:33.872000+00:00
      - name: count
        in: query
        description: Page size for the result.<br />Maximum limit is 1000
        schema:
          type: integer
          format: int32
          default: 100
      responses:
        '200':
          description: Returns the audit events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventsBean'
              examples:
                Example response:
                  description: Example response
                  value: "{\n  \"auditEvents\": [\n    {\n      \"application\": \"blueconic\",\n      \"date\": \"2025-04-15T11:21:33.872Z\",\n      \"userName\": \"test@blueconic.com\",\n      \"objects\": [\n        {\n          \"id\": \"68a02413-98d0-4a2b-b65c-4617a3c26fd0\",\n          \"name\": \"Campaign Tracker Listener ds\"\n        }\n      ],\n      \"objectType\": \"LISTENER\",\n      \"operation\": \"UPDATE\",\n      \"ipAddress\": \"192.168.1.100\"\n    },\n    {\n      \"application\": \"blueconic\",\n      \"date\": \"2025-04-15T11:21:33.672Z\",\n      \"userName\": \"test@blueconic.com\",\n      \"objectType\": \"PROFILEPROPERTY\",\n      \"objects\": [\n        {\n          \"id\": \"responded_to_campaigns\",\n          \"name\": \"responded_to_campaigns\"\n        }\n      ],\n      \"operation\": \"CREATE\",\n      \"ipAddress\": \"192.168.1.100\"\n    },\n    {\n      \"application\": \"blueconic\",\n      \"date\": \"2023-04-15T12:51:32.702Z\",\n      \"userName\": \"test@blueconic.com\",\n      \"objectType\": \"USER\",\n      \"objects\": [\n        {\n          \"id\": \"test@blueconic.com\",\n          \"name\": \"test@blueconic.com\"\n        }\n      ],\n      \"operation\": \"LOGIN\",\n      \"ipAddress\": \"192.168.1.100\"\n    },\n    {\n      \"application\": \"blueconic\",\n      \"date\": \"2023-04-15T12:51:32.702Z\",\n      \"objectType\": \"USER\",\n      \"objects\": [\n        {\n          \"id\": \"wrongpassword@blueconic.com\",\n          \"name\": \"wrongpassword@blueconic.com\"\n        }\n      ],\n      \"operation\": \"LOGIN_FAILED\",\n      \"ipAddress\": \"192.168.1.100\"\n    },\n    {\n      \"application\": \"blueconic\",\n      \"date\": \"2023-04-15T12:51:32.702Z\",\n      \"objectType\": \"USER\",\n      \"objects\": [\n        {\n          \"id\": \"\",\n          \"name\": \"\"\n        }\n      ],\n      \"operation\": \"LOGIN_FAILED\",\n      \"ipAddress\": \"192.168.1.100\"\n    },\n    {\n      \"application\": \"blueconic\",\n      \"date\": \"2023-04-15T12:51:32.702Z\",\n      \"objectType\": \"USER\",\n      \"objects\": [\n        {\n          \"id\": \"nonexistinguserName@blueconic.com\",\n          \"name\": \"nonexistinguserName@blueconic.com\"\n        }\n      ],\n      \"operation\": \"LOGIN_FAILED\",\n      \"ipAddress\": \"192.168.1.100\"\n    },\n    {\n      \"application\": \"blueconic\",\n      \"date\": \"2023-04-15T12:51:32.702Z\",\n      \"userName\": \"test@blueconic.com\",\n      \"objectType\": \"PROFILE\",\n      \"objects\": [\n        {\n          \"id\": \"4dc2a97e-707e-4049-a03a-badcce564f3c\",\n          \"name\": \"4dc2a97e-707e-4049-a03a-badcce564f3c\"\n        },\n        {\n          \"id\": \"test@blueconic.com\",\n          \"name\": \"33f53658-3dc8-4946-b239-ecb65dea9827\"\n        }\n      ],\n      \"operation\": \"READ\",\n      \"ipAddress\": \"192.168.1.100\"\n    }\n  ]\n}"
        '400':
          description: One or more required parameters are missing or invalid.
        '401':
          description: Authentication failed (unauthorized).
      security:
      - oauth2:
        - read:audit-events
components:
  schemas:
    AuditEntryBean:
      type: object
      properties:
        application:
          type: string
        date:
          type: string
          format: date-time
          description: Datetime in UTC when the event occurred. The date is in the https://www.ietf.org/rfc/rfc3339.txt format, example = "2025-01-22T11:21:33.872Z".
        ipAddress:
          type: string
        objectType:
          type: string
          enum:
          - DIALOGUE
          - LISTENER
          - CONNECTION
          - VARIANT
          - SEGMENT
          - PROFILE_PROPERTY
          - GROUP_PROPERTY
          - TRACKER
          - DASHBOARD
          - LIFECYCLE
          - PLUGIN
          - USER
          - ROLE
          - CHANNEL
          - BLUECONIC_HOSTNAME
          - LANGUAGE
          - CONTENTSTORE
          - STATISTICS
          - FAVORITE
          - TEMPLATE
          - NOTEBOOK
          - PRIORITY
          - GROUP_TYPE
          - CLEANUP_RULE
          - MERGE_RULE
          - COMPOSITION_RULE
          - OBJECTIVE
          - TIMELINE_EVENT_TYPE
          - PROFILE
          - IP_RANGE
          - GROUP
          - SUPPORTED_LEGISLATION_ZONE
          - DOMAIN_GROUP
          - DOMAIN
          - PRIVACY_SETTING
          - SINGLE_SIGN_ON_SETTING
          - BLUECONIC_SUPPORT_ACCESS_SETTING
          - OAUTH_APPLICATION
          - OAUTH_TOKEN
          - TIMELINE_EVENT_ROLLUP
          - INACTIVITY_SETTING
          - AI_CANVAS
          - MODEL
          - GEN_AI_SETTING
        objects:
          type: array
          items:
            $ref: '#/components/schemas/AuditEntryObjectBean'
        operation:
          type: string
          enum:
          - CREATE
          - UPDATE
          - DELETE
          - READ
          - LOGIN
          - LOGOUT
          - LOGIN_FAILED
          - PROFILE_MERGE_TRIGGERED_BY_USER
          - PASSWORD_RESET_REQUESTED
          - PASSWORD_CHANGE
          - MANUAL_RUN
          - SCHEDULED_RUN
          - EDITOR_RUN
        username:
          type: string
      required:
      - date
      - objectType
      - operation
    AuditEntryObjectBean:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
    AuditEventsBean:
      type: object
      properties:
        auditEvents:
          type: array
          items:
            $ref: '#/components/schemas/AuditEntryBean'
  securitySchemes:
    oauth2:
      type: oauth2
      description: 'Authenticates a registered OAuth 2.0 client. The Authorization code flow and Client credentials flow are supported. Make sure to select the correct flow based on which flow the registered client supports. The client id and client secret can be found in BlueConic by opening the registered client under *Settings* > *Access management* > *Applications*.<br/>**NOTE:** When using the Authorization code flow, the redirect URL of the registered client in BlueConic must be set to `https://rest.apidoc.blueconic.com/oauth-receiver.html` and ''Send Proof Key for Code Exchange'' must be enabled.<br/><br/>To use a Bearer token for authentication, follow these steps: <br/>1. Acquire the token through authentication.<br/>2. Include the token in the request''s Authorization header as Bearer \<token\>.<br/>3. Send the request to access protected resources.<br/>4. Handle token expiration by refreshing or obtaining a new token.'
      flows:
        clientCredentials:
          tokenUrl: /rest/v2/oauth/token
        authorizationCode:
          authorizationUrl: /rest/v2/oauth/authorize
          tokenUrl: /rest/v2/oauth/token
          refreshUrl: /rest/v2/oauth/token
