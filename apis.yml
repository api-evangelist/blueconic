aid: blueconic
name: BlueConic
description: BlueConic is a customer data platform (CDP) with a REST API for managing
  unified customer profiles, lifecycle stages, segments, connections, and permissions-based
  data activation. The API provides OAuth 2.0-secured access to visitor profiles,
  segments, interactions, and audit events via an OpenAPI-compliant interface.
