components:
  schemas:
    profile:
      type: object
      description: The profiles that are in this segment.
      properties:
        id:
          type: string
          description: The unique identifier for the object.
        creationDate:
          type: string
          format: date-time
          description: The creation date of the object. Datetime in UTC in the https://www.ietf.org/rfc/rfc3339.txt format, example = "2025-01-22T11:21:33.872Z".
        privacyLegislation:
          type: string
          description: The default privacy legislation for creating profiles (not for matching).
          enum:
          - NONE
          - GDPR
          - PIPEDA
          - CCPA
          - SB220
          - NYPA
          - PERU_DPL
          - ARGENTINA_DPL
          - SB1392
          - SB190
          - BRAZIL_LGPD
          - ISRAEL_PPL
          - JAPAN_APPI
          - NEW_ZEALAND_PRIVACY_ACT
          - SWITZERLAND_DPA
          - UK_GDPR
          - CHINA_PIPL
          - AUSTRALIA_PRIVACY_ACT
          - CDPA_CTCPDA
          - UCPA
          - MEXICO_LFPDPPP
        consentedObjectives:
          type: array
          description: List of objective IDs that the profile has given consent to.
          items:
            type: string
            description: List of objective IDs that the profile has given consent to.
        refusedObjectives:
          type: array
          description: List of objective IDs that the profile has refused consent to.
          items:
            type: string
            description: List of objective IDs that the profile has refused consent to.
        permissions:
          $ref: '#/components/schemas/permissions'
        properties:
          type: array
          items:
            $ref: '#/components/schemas/property'
        events:
          type: array
          items:
            $ref: '#/components/schemas/event'
        groups:
          type: array
          description: Groups that the profile is a part of.
          items:
            $ref: '#/components/schemas/group'
        matchingGroups:
          type: array
          description: Groups that the profile is a part of and match the segment refinements.
          items:
            $ref: '#/components/schemas/matchingGroup'
        lifecycleStages:
          type: array
          description: Lifecycle stages that the profile is part of.
          items:
            $ref: '#/components/schemas/lifecycleStage'
        replacedBy:
          type: string
          description: The profile ID that replaced this profile.
        replaces:
          type: array
          description: The IDs of the profiles that are replaced by this profile.
          items:
            type: string
            description: The IDs of the profiles that are replaced by this profile.
        segments:
          type: array
          items:
            $ref: '#/components/schemas/profileSegmentBean'
    SegmentProfiles:
      type: object
      properties:
        cursor:
          type: string
          description: The cursor of the current page. `*` when not passed.
        itemsPerPage:
          type: integer
          format: int32
          description: Number of results per page.
          readOnly: true
        links:
          type: array
          description: The links to the first and next/last page.
          items:
            $ref: '#/components/schemas/link'
        nextCursor:
          type: string
          description: The cursor of the next page (if any).
        profiles:
          type: array
          description: The profiles that are in this segment.
          items:
            $ref: '#/components/schemas/profile'
        totalPages:
          type: integer
          format: int32
          description: The total number of pages.
          readOnly: true
        totalResults:
          type: integer
          format: int32
          description: The total number of results.
          readOnly: true
    segments:
      type: object
      properties:
        itemsPerPage:
          type: integer
          format: int32
          description: Number of results per page.
          readOnly: true
        segments:
          type: array
          description: The segments.
          items:
            $ref: '#/components/schemas/segment'
        startIndex:
          type: integer
          format: int32
          description: The start index.
          readOnly: true
        totalPages:
          type: integer
          format: int32
          description: The total number of pages.
          readOnly: true
        totalResults:
          type: integer
          format: int32
          description: The total number of results.
          readOnly: true
    Property:
      type: object
      properties:
        id:
          type: string
          description: Timeline event property ID to apply to this rule for.
        strategy:
          type: string
          description: The strategy to apply to primitive timeline event properties. For nested timeline event properties, SET/UPSERT/UPDATE/DELETE are supported.
          enum:
          - ADD
          - SET
          - SET_IF_EMPTY
          writeOnly: true
        values:
          type: array
          description: The values for this timeline event property. Either a list of primitives (strings, numbers, booleans) or a list of objects (see example).
          items:
            type: object
            description: The values for this timeline event property. Either a list of primitives (strings, numbers, booleans) or a list of objects (see example).
    segment:
      type: object
      description: The segments.
      properties:
        creationDate:
          type: string
          format: date-time
          description: The creation date of the object. Datetime in UTC in the https://www.ietf.org/rfc/rfc3339.txt format, example = "2025-01-22T11:21:33.872Z".
          readOnly: true
        creator:
          $ref: '#/components/schemas/UserBean'
        description:
          type: string
          description: The description.
        id:
          type: string
          description: The object ID.
        inverseOf:
          type: string
          description: The ID of the segment of which this is the inverse.
        inversedBy:
          type: string
          description: The ID of the segment that inversed this segment.
        lastModifiedDate:
          type: string
          format: date-time
          description: The last modified date of the object. Datetime in UTC in the https://www.ietf.org/rfc/rfc3339.txt format, example = "2025-01-22T11:21:33.872Z".
          readOnly: true
        lastModifiedUser:
          $ref: '#/components/schemas/UserBean'
        name:
          type: string
          description: The object name.
        profileCount:
          type: integer
          format: int32
          description: The number of profiles in this segment.
        tags:
          type: array
          description: The tags (i.e. labels).
          example: Address
          items:
            type: string
            description: The tags (i.e. labels).
            example: Address
    simpleObject:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier.
        name:
          type: string
          description: The object name.
    link:
      type: object
      properties:
        Href:
          type: string
          description: The href of the link
        Rel:
          type: string
          description: The link rel e.g. 'self', 'next', etc.
        Type:
          type: string
          description: The type of the link e.g. 'application/json'
    group:
      type: object
      description: Groups that the profile is a part of.
      properties:
        creationDate:
          type: string
          format: date-time
          description: The creation date of the object. Datetime in UTC in the https://www.ietf.org/rfc/rfc3339.txt format, example = "2025-01-22T11:21:33.872Z".
        groupTypeId:
          type: string
          description: The ID of the BlueConic group type.
        id:
          type: string
          description: The unique identifier for the object.
        lastModifiedDate:
          type: string
          format: date-time
          description: The last modified date of the object. Datetime in UTC in the https://www.ietf.org/rfc/rfc3339.txt format, example = "2025-01-22T11:21:33.872Z".
        properties:
          type: array
          items:
            $ref: '#/components/schemas/property'
    matchingGroup:
      type: object
      description: Groups that the profile is a part of and match the segment refinements.
      properties:
        profilePropertyId:
          type: string
          description: The ID of the BlueConic profile property.
        groupIds:
          type: array
          description: The matching group IDs.
          items:
            type: string
            description: The matching group IDs.
    RefinementBean:
      type: object
      properties:
        daysCount:
          type: integer
          format: int32
          description: The days count
        filters:
          type: array
          items:
            $ref: '#/components/schemas/RefinementBean'
        fromDate:
          type: string
          description: The from date in ISO 8601 format (e.g. '2025-01-22T11:21:33.872Z')
        fromValue:
          type: integer
          format: int32
          description: The from value
        groupProperty:
          type: string
          description: The group property
        hoursCount:
          type: integer
          format: int32
          description: The hours count
        objective:
          type: string
          description: The objective
        operator:
          type: string
          description: The operator
        property:
          type: string
          description: The property
        toDate:
          type: string
          description: The to date in ISO 8601 format (e.g. '2025-01-22T11:21:33.872Z')
        toValue:
          type: integer
          format: int32
          description: The to value
        values:
          type: array
          description: The values
          items:
            type: string
            description: The values
    permissions:
      type: object
      properties:
        level:
          type: string
          description: The permission level of the profile
    lifecycleStage:
      type: object
      description: Lifecycle stages that the profile is part of.
      properties:
        lifecycle:
          $ref: '#/components/schemas/simpleObject'
        stage:
          $ref: '#/components/schemas/simpleObject'
    UserBean:
      type: object
      description: BlueConic user.
      properties:
        fullName:
          type: string
          description: The full name of the user.
        userName:
          type: string
          description: The username.
      readOnly: true
    event:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Property'
        date:
          type: string
          format: date-time
          description: Timestamp for the event. The format of date is "2018-01-01T00:00Z" or with a timezone offset "2018-01-01T00:00+05:00". If empty, "now" will be used.
        eventTypeId:
          type: string
          description: The type identifier of the event. See https://yourserver.blueconic.net/rest/timelineEventTypes?alt=json for the list of defined event types.
        id:
          type: string
          description: An identifier to identify the event. Preferred to be unique, although it isn't required. If an event with the same ID is present on the profile's timeline, it will be overwritten. Note that the combination of ID, event type ID, and date uniquely identifies an event.
        identifier:
          type: string
          description: An (external) identifier which can be passed along with a timeline event operation and is returned in the response.
        strategy:
          type: string
          description: How the event will be applied to the timeline.
          enum:
          - SET
          - UPSERT
          - UPDATE
          - DELETE
          writeOnly: true
    property:
      type: object
      description: A property consisting of an ID and a list of values.
      properties:
        id:
          type: string
          description: The ID of the property.
        values:
          type: array
          description: Values for this property.
          items:
            type: string
            description: Values for this property.
    profileSegmentBean:
      type: object
      properties:
        id:
          type: string
          description: The ID of the segment.
        name:
          type: string
          description: The name of the segment.
        tags:
          type: array
          description: The labels of the segment (optionally included).
          items:
            type: string
            description: The labels of the segment (optionally included).
  securitySchemes:
    oauth2:
      type: oauth2
      description: 'Authenticates a registered OAuth 2.0 client. The Authorization code flow and Client credentials flow are supported. Make sure to select the correct flow based on which flow the registered client supports. The client id and client secret can be found in BlueConic by opening the registered client under *Settings* > *Access management* > *Applications*.<br/>**NOTE:** When using the Authorization code flow, the redirect URL of the registered client in BlueConic must be set to `https://rest.apidoc.blueconic.com/oauth-receiver.html` and ''Send Proof Key for Code Exchange'' must be enabled.<br/><br/>To use a Bearer token for authentication, follow these steps: <br/>1. Acquire the token through authentication.<br/>2. Include the token in the request''s Authorization header as Bearer \<token\>.<br/>3. Send the request to access protected resources.<br/>4. Handle token expiration by refreshing or obtaining a new token.'
      flows:
        clientCredentials:
          tokenUrl: /rest/v2/oauth/token
        authorizationCode:
          authorizationUrl: /rest/v2/oauth/authorize
          tokenUrl: /rest/v2/oauth/token
          refreshUrl: /rest/v2/oauth/token
