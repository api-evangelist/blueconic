servers:
- url: https://{blueconicHostname}/rest/v2
  description: The BlueConic server
  variables:
    blueconicHostname:
      description: BlueConic server hostname, e.g. 'tenant.blueconic.net'
      default: tenantname
tags:
- name: Models
  description: 'The following methods allow you to create, modify, retrieve, and delete machine learning Models in ONNX format. See [Models](https://support.blueconic.com/en/articles/307965-real-time-models). '
paths:
  /models:
    get:
      tags:
      - Models
      summary: Get all models
      description: Retrieves all models (without the model binaries).
      operationId: getAllModels
      parameters:
      - name: count
        in: query
        description: Specifies the number of results to return.
        schema:
          type: integer
          format: int64
          default: 20
          example: 10
      - name: startIndex
        in: query
        description: Specifies the index of the first item to include in the result.
        schema:
          type: integer
          format: int64
          default: 0
          example: 0
      responses:
        '200':
          description: Returns the models.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models'
              examples:
                Response body:
                  description: Response body
                  value: "{\n  \"itemsPerPage\": 20,\n  \"models\": [\n    {\n      \"creationDate\": \"2025-04-17T14:00:46.920Z\",\n      \"creator\": {\n        \"fullName\": \"ondemand@blueconic.com\",\n        \"userName\": \"ondemand@blueconic.com\"\n      },\n      \"description\": \"somedescription\",\n      \"id\": \"2613c9d6-a179-4c79-b6d2-1618a53fbc64\",\n      \"lastModifiedDate\": \"2025-04-17T14:00:46.920Z\",\n      \"lastModifiedUser\": {\n        \"fullName\": \"ondemand@blueconic.com\",\n        \"userName\": \"ondemand@blueconic.com\"\n      },\n      \"modelHash\": \"9a9887d8676976851423ac44de8a97d4\",\n      \"modelUrl\": \"/rest/v2/models/2613c9d6-a179-4c79-b6d2-1618a53fbc64/model\",\n      \"name\": \"mymodel\",\n      \"parameters\": [\n        {\n          \"id\": \"parameterForModel\",\n          \"relation\": \"sets\",\n          \"type\": \"GENERAL\",\n          \"values\": [\n            \"parameter value 1\"\n          ]\n        }\n      ],\n      \"tags\": [],\n      \"type\": \"GENERAL\"\n    },\n    {\n      \"creationDate\" : \"2025-05-01T08:16:00.458Z\",\n      \"creator\" : {\n        \"fullName\" : \"ondemand@blueconic.com\",\n        \"userName\" : \"ondemand@blueconic.com\"\n      },\n      \"featureNames\" : [ \"browsername=chrome\", \"browsername=edge\", \"browsername=ie\", \"interactions_clicked\" ],\n      \"id\" : \"682c7614-4456-4ca8-83d3-17f768b5ca14\",\n      \"lastModifiedDate\" : \"2025-05-14T11:38:42.535Z\",\n      \"lastModifiedUser\" : {\n        \"fullName\" : \"ondemand@blueconic.com\",\n        \"userName\" : \"ondemand@blueconic.com\"\n      },\n      \"modelHash\" : \"2e9f9c2e7384dd83f0aa015f4c88342f\",\n      \"modelUrl\" : \"/rest/v2/models/682c7614-4456-4ca8-83d3-17f768b5ca14/model\",\n      \"name\" : \"Dialogue model with onnx model set\",\n      \"parameters\" : [],\n      \"profilePropertyIds\" : [ \"browsername\", \"interactions_clicked\" ],\n      \"tags\" : [],\n      \"type\" : \"DIALOGUE\"\n    }\n  ],\n  \"startIndex\": 0,\n  \"totalPages\": 1,\n  \"totalResults\": 2\n}"
        '401':
          description: Authentication failed (unauthorized).
        '403':
          description: Authorization failed (incorrect permissions).
        '503':
          description: The server is too busy to handle the request.
      security:
      - oauth2:
        - read:models
    post:
      tags:
      - Models
      summary: Create model
      description: Create a model.
      operationId: createModel
      requestBody:
        description: "To create a model, a `multipart/form-data` request can be sent to the `/models` endpoint via the `POST` method. <br/>\nThe request body can contain multiple parts, named as follows: <br/><br/>\n\n- `metadata`: The metadata for the model. This is a JSON object that contains the model's metadata properties.\n- `model`: The binary ONNX model, serialized as specified in the ONNX [documentation](https://onnx.ai/onnx/api/serialization.html).\n\nThe `model` part is optional and can be updated later using the `PUT /models/{modelId}` endpoint.<br/>\nThe `metadata` part is required and must be included in the request.\n\n### DIALOGUE and RECOMMENDATION models\n\nWhen creating a model of type `DIALOGUE` or `RECOMMENDATION`, the following property is optional in the `metadata` part:\n- `profilePropertyIds`: The profile property ID's that are used for training the model (for example `['browsername', 'interactions_clicked']`). This is only relevant for models that have a `profile` input.\n\nOnce the model is sufficiently trained, the `featureNames` can be extracted (from a [`DictVectorizer`](https://scikit-learn.org/stable/modules/generated/sklearn.feature_extraction.DictVectorizer.html)) and used to update the model metadata.<br/>\nThe `featureNames` must be defined in the following format and is only required when an ONNX model is provided:\n```json\n{\n  \"featureNames\": [\n    \"browsername=chrome\",\n    \"browsername=edge\",\n    \"lastvisitdate\",\n    \"interactions_clicked\"\n  ]\n}\n```\n\n#### ONNX model requirements\nThe ONNX model must have the following input names:\n* `variant_ids` (str[]): the list of variant IDs to consider in the ONNX model\n* If the model contains a `profile` input name, then the length of the input array should be equal to the length of the `featureNames`.\n\nThe ONNX model must have the following output names:\n* `variant_id` (str): the variant ID that should be served based on the ONNX model outcome\n\n### RECOMMENDATION models\n\nWhen creating a model of type `RECOMMENDATION`, the `metadata` part _can_ contain the following additional property:\n- `storeId`: An optional content/product store ID for which the models is trained. If not provider, the model can work across multiple stores.\n\n#### ONNX model requirements\nThe ONNX model _can_ use one or more of the following input names:\n* `id` (str[]): a list of external item IDs for all relevant items the recommender can choose from\n* `current_item` (str): the id of the current item\n* `profile` (float[]): the profile feature vector, based on the `propertyIds` and `featureNames` of the model\n** If the model contains a `profile` input name, then the length of the input array should be equal to the length of the `featureNames`.\n* `last_order_date` (int64): the number of hours since the last time the product was ordered by the customer\n* `shoppingcart` (int64): whether the item is currently in the customer’s cart\n* `viewed` (int64): the number of times the item was viewed by the customer\n* `ordered` (int64): the number of times the item was ordered by the customer\n* `recent_view` (int64): the number of times the item was viewed in the configured timeframe\n* `recent_click` (int64): the number of times the item was clicked in the configured timeframe\n* `recent_entrypage` (int64): the number of times the item was the landing page in the configured timeframe\n* `recent_recommendation_view` (int64): the number of times the item was viewed in a recommendation in the configured timeframe\n* `recent_shoppingcart` (int64): the number of times the item was added to a shoppingcart in the configured timeframe\n* `recent_order` (int64): the number of times the item was ordered in the configured timeframe\n\nThe ONNX model must have the following output names:\n* `score` (float[]): the `score` that should be used to rank the recommendations. A list of scores between 0 and 1 for all items.\n\n### CONTINUOUS models\n\nWhen creating a model of type `CONTINUOUS`, the `metadata` part _can_ contain the following additional properties:\n- `profilePropertyIds`: The profile property ID's that are used as input features for the model (for example `['age', 'lifetime_value']`). This is only relevant for models that have a `profile` input.\n- `segmentId`: An optional segment ID to restrict model execution to profiles that are a member of this segment. If not provided, the model is executed for all profiles.\n\nOnce the model is sufficiently trained, the `featureNames` can be extracted (from a [`DictVectorizer`](https://scikit-learn.org/stable/modules/generated/sklearn.feature_extraction.DictVectorizer.html)) and used to update the model metadata.<br/>\nThe `featureNames` must be defined in the following format and is only required when the ONNX model has a `profile` input:\n```json\n{\n  \"featureNames\": [\n    \"age\",\n    \"lifetime_value\",\n    \"purchase_frequency\",\n    \"browsername=edge\"\n  ]\n}\n```\n\nThe model is automatically executed when a profile is loaded (via web) or when relevant profile properties are updated (any source). All outputs the model defines will be stored as profile properties on the profile.\n\n#### ONNX model requirements\nThe ONNX model _can_ use the following input name:\n* `profile` (float[]): the profile feature vector, based on the `profilePropertyIds` and `featureNames` of the model. This input is optional — if not present, the model is executed without any profile input.\n  * If the model contains a `profile` input name, then the length of the input array should be equal to the length of the `featureNames`.\n\nThe ONNX model can have any number of output names. Each output will be stored as a profile property with the same name on the profile."
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateModelBean'
        required: true
      responses:
        '200':
          description: Returns the created model.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelBean'
              examples:
                Response body with ONNX model (GENERAL):
                  description: Response body with ONNX model (GENERAL)
                  value: "{\n  \"creationDate\": \"2025-04-17T14:00:46.920Z\",\n  \"creator\": {\n    \"fullName\": \"ondemand@blueconic.com\",\n    \"userName\": \"ondemand@blueconic.com\"\n  },\n  \"description\": \"somedescription\",\n  \"id\": \"2613c9d6-a179-4c79-b6d2-1618a53fbc64\",\n  \"lastModifiedDate\": \"2025-04-17T14:00:46.920Z\",\n  \"lastModifiedUser\": {\n    \"fullName\": \"ondemand@blueconic.com\",\n    \"userName\": \"ondemand@blueconic.com\"\n  },\n  \"modelHash\": \"9a9887d8676976851423ac44de8a97d4\",\n  \"modelUrl\": \"/rest/v2/models/2613c9d6-a179-4c79-b6d2-1618a53fbc64/model\",\n  \"name\": \"mymodel with onnx model set\",\n  \"parameters\": [\n    {\n      \"id\": \"abc\",\n      \"values\": [\n        \"123\"\n      ]\n    }\n  ],\n  \"tags\": [],\n  \"type\": \"GENERAL\"\n}"
                Response body with ONNX model (DIALOGUE):
                  description: Response body with ONNX model (DIALOGUE)
                  value: "{\n  \"creationDate\" : \"2025-05-01T08:16:00.458Z\",\n  \"creator\" : {\n    \"fullName\" : \"ondemand@blueconic.com\",\n    \"userName\" : \"ondemand@blueconic.com\"\n  },\n  \"featureNames\" : [ \"browsername=chrome\", \"browsername=edge\", \"browsername=ie\", \"interactions_clicked\" ],\n  \"id\" : \"682c7614-4456-4ca8-83d3-17f768b5ca14\",\n  \"lastModifiedDate\" : \"2025-05-14T11:38:42.535Z\",\n  \"lastModifiedUser\" : {\n    \"fullName\" : \"ondemand@blueconic.com\",\n    \"userName\" : \"ondemand@blueconic.com\"\n  },\n  \"modelHash\" : \"2e9f9c2e7384dd83f0aa015f4c88342f\",\n  \"modelUrl\" : \"/rest/v2/models/682c7614-4456-4ca8-83d3-17f768b5ca14/model\",\n  \"name\" : \"Dialogue model with onnx model set\",\n  \"parameters\" : [ ],\n  \"profilePropertyIds\" : [ \"browsername\", \"interactions_clicked\" ],\n  \"tags\" : [ ],\n  \"type\" : \"DIALOGUE\"\n}"
                Response body with ONNX model (RECOMMENDATION):
                  description: Response body with ONNX model (RECOMMENDATION)
                  value: "{\n  \"creationDate\" : \"2025-05-01T08:16:00.458Z\",\n  \"creator\" : {\n    \"fullName\" : \"ondemand@blueconic.com\",\n    \"userName\" : \"ondemand@blueconic.com\"\n  },\n  \"featureNames\" : [ \"browsername=chrome\", \"browsername=edge\", \"browsername=ie\", \"interactions_clicked\" ],\n  \"id\" : \"682c7614-4456-4ca8-83d3-17f768b5ca14\",\n  \"lastModifiedDate\" : \"2025-05-14T11:38:42.535Z\",\n  \"lastModifiedUser\" : {\n    \"fullName\" : \"ondemand@blueconic.com\",\n    \"userName\" : \"ondemand@blueconic.com\"\n  },\n  \"modelHash\" : \"2e9f9c2e7384dd83f0aa015f4c88342f\",\n  \"modelUrl\" : \"/rest/v2/models/682c7614-4456-4ca8-83d3-17f768b5ca14/model\",\n  \"name\" : \"Recommendation model with onnx model set\",\n  \"parameters\" : [ ],\n  \"profilePropertyIds\" : [ \"browsername\", \"interactions_clicked\" ],\n  \"tags\" : [ ],\n  \"type\" : \"RECOMMENDATION\",\n  \"storeId\": \"e7b65b21-3e6b-4009-8b6b-3cd26862a689\"\n}"
                Response body with ONNX model (CONTINUOUS):
                  description: Response body with ONNX model (CONTINUOUS)
                  value: "{\n  \"creationDate\" : \"2025-05-01T08:16:00.458Z\",\n  \"creator\" : {\n    \"fullName\" : \"ondemand@blueconic.com\",\n    \"userName\" : \"ondemand@blueconic.com\"\n  },\n  \"featureNames\" : [ \"age\", \"lifetime_value\", \"purchase_frequency\" ],\n  \"id\" : \"882c7614-4456-4ca8-83d3-17f768b5ca15\",\n  \"lastModifiedDate\" : \"2025-05-14T11:38:42.535Z\",\n  \"lastModifiedUser\" : {\n    \"fullName\" : \"ondemand@blueconic.com\",\n    \"userName\" : \"ondemand@blueconic.com\"\n  },\n  \"modelHash\" : \"3e9f9c2e7384dd83f0aa015f4c88342f\",\n  \"modelUrl\" : \"/rest/v2/models/882c7614-4456-4ca8-83d3-17f768b5ca15/model\",\n  \"name\" : \"Continuous model with onnx model set\",\n  \"parameters\" : [ ],\n  \"profilePropertyIds\" : [ \"age\", \"lifetime_value\", \"purchase_frequency\" ],\n  \"segmentId\" : \"c82c7614-4456-4ca8-83d3-17f768b5ca99\",\n  \"tags\" : [ ],\n  \"type\" : \"CONTINUOUS\"\n}\n"
                Response body without ONNX model (GENERAL):
                  description: Response body without ONNX model (GENERAL)
                  value: "{\n  \"creationDate\": \"2025-04-17T14:00:46.920Z\",\n  \"creator\": {\n    \"fullName\": \"ondemand@blueconic.com\",\n    \"userName\": \"ondemand@blueconic.com\"\n  },\n  \"description\": \"somedescription\",\n  \"id\": \"2613c9d6-a179-4c79-b6d2-1618a53fbc64\",\n  \"lastModifiedDate\": \"2025-04-17T14:00:46.920Z\",\n  \"lastModifiedUser\": {\n    \"fullName\": \"ondemand@blueconic.com\",\n    \"userName\": \"ondemand@blueconic.com\"\n  },\n  \"name\": \"mymodel without onnx model set\",\n  \"parameters\": [\n    {\n      \"id\": \"abc\",\n      \"values\": [\n        \"123\"\n      ]\n    }\n  ],\n  \"tags\": [],\n  \"type\": \"GENERAL\"\n}"
        '400':
