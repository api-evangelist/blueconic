    put:
      tags:
      - Models
      summary: Update model
      description: Update a model by id.
      operationId: updateModel
      parameters:
      - name: model
        in: path
        description: The ID of the model to update.
        required: true
        schema:
          type: string
        examples:
          UUID of the model:
            description: UUID of the model
            value: 2613c9d6-a179-4c79-b6d2-1618a53fbc64
      requestBody:
        description: "To update a model, a `multipart/form-data` request can be sent to the `/models` endpoint via the `PUT` method. <br/>\nThe request body can contain multiple parts, named as follows: <br/><br/>\n\n- `metadata`: The updated metadata for the model. This is a JSON object that contains the model's metadata properties.\n- `model`: The binary ONNX model, serialized as specified in the ONNX [documentation](https://onnx.ai/onnx/api/serialization.html).\n\nBoth parts are optional, meaning that you can update the metadata without providing a new model, or you can provide a new model without updating the metadata.<br/>\nFor the `metadata` part, no partial updates are supported. The entire metadata object must be provided in the request.<br/>\nAt least one part needs to be supplied, otherwise a HTTP 400 is returned.\n\n### DIALOGUE and RECOMMENDATION models\n\nWhen updating a model of type `DIALOGUE`or `RECOMMENDATION`, the `metadata` part must contain the following additional property:\n- `profilePropertyIds`: The profile property ID's that are used for training the model (for example `['browsername', 'interactions_clicked']`).\n\nOnce the model is sufficiently trained, the `featureNames` can be extracted (from a [`DictVectorizer`](https://scikit-learn.org/stable/modules/generated/sklearn.feature_extraction.DictVectorizer.html)) and used to update the model metadata.<br/>\nThe `featureNames` must be defined in the following format and is only required when an ONNX model is provided:\n```json\n{\n  \"featureNames\": [\n    \"browsername=chrome\",\n    \"browsername=edge\",\n    \"lastvisitdate\",\n    \"interactions_clicked\"\n  ]\n}\n```\n\n#### ONNX model requirements\nThe ONNX model must have the following input names:\n* `variant_ids` (str[]): the list of variant IDs to consider in the ONNX model\n* If the model contains a `profile` input name, then the length of the input array should be equal to the length of the `featureNames`.\n\nThe ONNX model must have the following output names:\n* `variant_id` (str): the variant ID that should be served based on the ONNX model outcome\n\n### RECOMMENDATION models\n\nWhen updating a model of type `RECOMMENDATION`, the `metadata` part _can_ contain the following additional property:\n- `storeId`: An optional content/product store ID for which the models is trained. If not provider, the model can work across multiple stores.\n\n#### ONNX model requirements\nThe ONNX model _can_ use one or more of the following input names:\n* `id` (str[]): a list of external item IDs for all relevant items the recommender can choose from\n* `current_item` (str): the id of the current item\n* `profile` (float[]): the profile feature vector, based on the `propertyIds` and `featureNames` of the model\n** If the model contains a `profile` input name, then the length of the input array should be equal to the length of the `featureNames`.\n* `last_order_date` (int64): the number of hours since the last time the product was ordered by the customer\n* `shoppingcart` (int64): whether the item is currently in the customer’s cart\n* `viewed` (int64): the number of times the item was viewed by the customer\n* `ordered` (int64): the number of times the item was ordered by the customer\n* `recent_view` (int64): the number of times the item was viewed in the configured timeframe\n* `recent_click` (int64): the number of times the item was clicked in the configured timeframe\n* `recent_entrypage` (int64): the number of times the item was the landing page in the configured timeframe\n* `recent_recommendation_view` (int64): the number of times the item was viewed in a recommendation in the configured timeframe\n* `recent_shoppingcart` (int64): the number of times the item was added to a shoppingcart in the configured timeframe\n* `recent_order` (int64): the number of times the item was ordered in the configured timeframe\n\nThe ONNX model must have the following output names:\n* `score` (float[]): the `score` that should be used to rank the recommendations. A list of scores between 0 and 1 for all items.\n\n### CONTINUOUS models\n\nWhen updating a model of type `CONTINUOUS`, the `metadata` part _can_ contain the following additional properties:\n- `profilePropertyIds`: The profile property ID's that are used as input features for the model (for example `['age', 'lifetime_value']`). This is only relevant for models that have a `profile` input.\n- `segmentId`: An optional segment ID to restrict model execution to profiles that are a member of this segment. If not provided, the model is executed for all profiles.\n\nOnce the model is sufficiently trained, the `featureNames` can be extracted (from a [`DictVectorizer`](https://scikit-learn.org/stable/modules/generated/sklearn.feature_extraction.DictVectorizer.html)) and used to update the model metadata.<br/>\nThe `featureNames` must be defined in the following format and is only required when the ONNX model has a `profile` input:\n```json\n{\n  \"featureNames\": [\n    \"age\",\n    \"lifetime_value\",\n    \"purchase_frequency\",\n    \"browsername=edge\"\n  ]\n}\n```\n\nThe model is automatically executed when a profile is loaded (via web) or when relevant profile properties are updated (any source). All outputs the model defines will be stored as profile properties on the profile.\n\n#### ONNX model requirements\nThe ONNX model _can_ use the following input name:\n* `profile` (float[]): the profile feature vector, based on the `profilePropertyIds` and `featureNames` of the model. This input is optional — if not present, the model is executed without any profile input.\n  * If the model contains a `profile` input name, then the length of the input array should be equal to the length of the `featureNames`.\n\nThe ONNX model can have any number of output names. Each output will be stored as a profile property with the same name on the profile."
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateModelBean'
        required: true
      responses:
        '200':
          description: Returns the updated model.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelBean'
              examples:
                Response body with ONNX model (GENERAL):
                  description: Response body with ONNX model (GENERAL)
                  value: "{\n  \"creationDate\": \"2025-04-17T14:00:46.920Z\",\n  \"creator\": {\n    \"fullName\": \"ondemand@blueconic.com\",\n    \"userName\": \"ondemand@blueconic.com\"\n  },\n  \"description\": \"somedescription\",\n  \"id\": \"2613c9d6-a179-4c79-b6d2-1618a53fbc64\",\n  \"lastModifiedDate\": \"2025-04-17T14:00:46.920Z\",\n  \"lastModifiedUser\": {\n    \"fullName\": \"ondemand@blueconic.com\",\n    \"userName\": \"ondemand@blueconic.com\"\n  },\n  \"modelHash\": \"9a9887d8676976851423ac44de8a97d4\",\n  \"modelUrl\": \"/rest/v2/models/2613c9d6-a179-4c79-b6d2-1618a53fbc64/model\",\n  \"name\": \"mymodel with onnx model set\",\n  \"parameters\": [\n    {\n      \"id\": \"abc\",\n      \"values\": [\n        \"123\"\n      ]\n    }\n  ],\n  \"tags\": [],\n  \"type\": \"GENERAL\"\n}"
                Response body with ONNX model (DIALOGUE):
