        '401':
          description: Authentication failed (unauthorized).
        '403':
          description: Authorization failed (incorrect permissions).
        '503':
          description: The server is too busy to handle the request.
      security:
      - oauth2:
        - read:listeners
  /listeners/{listener}:
    get:
      tags:
      - Listeners
      summary: Get one listener
      description: Retrieves a single listener.
      operationId: getOneListener
      parameters:
      - name: listener
        in: path
        description: The ID of the listener.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Returns the listener.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listener'
              examples:
                Response body:
                  description: Response body
                  value: "{\n  \"allChannels\": false,\n  \"creationDate\": \"2025-10-01T11:53:43.839Z\",\n  \"creator\": {\n    \"fullName\": \"ondemand@blueconic.com\",\n    \"userName\": \"ondemand@blueconic.com\"\n  },\n  \"description\": \"\",\n  \"domains\": [\n    {\n      \"id\": \"8d7757cf-9ed0-4807-b974-089ebc0197d0\",\n      \"name\": \"www.blueconic.test\"\n    }\n  ],\n  \"id\": \"28411027-a400-4c29-b962-bcb6910db736\",\n  \"isEnabled\": true,\n  \"lastModifiedDate\": \"2025-10-01T14:28:53.215Z\",\n  \"lastModifiedUser\": {\n    \"fullName\": \"ondemand@blueconic.com\",\n    \"userName\": \"ondemand@blueconic.com\"\n  },\n  \"lastActivationDate\": \"2025-11-27T10:35:43.034Z\",\n  \"name\": \"AdBlock Detection\",\n  \"pluginId\": \"listener_adblock\",\n  \"tags\": [],\n  \"targetChannels\": [\n    {\n      \"URLRestrictions\": [\n        {\n          \"pattern\": \"/tenant\",\n          \"previewURL\": \"\",\n          \"restrictionType\": \"RESTRICT\"\n        }\n      ],\n      \"channelId\": \"653d3db6-8016-46e8-96a5-547feceb9d15\"\n    }\n  ]\n}"
        '401':
          description: Authentication failed (unauthorized).
        '403':
          description: Authorization failed (incorrect permissions).
        '404':
          description: The listener doesn't exist.
        '503':
          description: The server is too busy to handle the request.
      security:
      - oauth2:
        - read:listeners
components:
  schemas:
    simpleDomain:
      type: object
      description: The domain.
      properties:
        id:
          type: string
          description: Unique identifier.
        name:
          type: string
          description: Name of this object.
      readOnly: true
    targetChannels:
      type: object
      description: Target channel.
      properties:
        URLRestrictions:
          type: array
          items:
            $ref: '#/components/schemas/UrlRestriction'
        channelId:
          type: string
          description: The ID of the channel.
      required:
      - URLRestrictions
    UserBean:
      type: object
      description: BlueConic user.
      properties:
        fullName:
          type: string
          description: The full name of the user.
        userName:
          type: string
          description: The username.
      readOnly: true
    UrlRestriction:
      type: object
      description: URL restriction for a target channel.
      properties:
        pattern:
          type: string
          description: The URL pattern.
        previewURL:
          type: string
          description: The preview URL.
        restrictionType:
          type: string
          description: The restriction type.
          enum:
          - RESTRICT
          - EXCLUDE
    Listener:
      type: object
      description: A listener
      properties:
        allChannels:
          type: boolean
          description: Indicates whether the executable is active on all channels
        creationDate:
          type: string
          format: date-time
          description: The creation date of the object. Datetime in UTC in the https://www.ietf.org/rfc/rfc3339.txt format, example = "2025-01-22T11:21:33.872Z".
          readOnly: true
        creator:
          $ref: '#/components/schemas/UserBean'
        description:
          type: string
          description: The description.
        domains:
          type: array
          items:
            $ref: '#/components/schemas/simpleDomain'
        id:
          type: string
          description: The object ID.
        isEnabled:
          type: boolean
          description: Indicates whether it is enabled
        lastModifiedDate:
          type: string
          format: date-time
          description: The last modified date of the object. Datetime in UTC in the https://www.ietf.org/rfc/rfc3339.txt format, example = "2025-01-22T11:21:33.872Z".
          readOnly: true
        lastModifiedUser:
          $ref: '#/components/schemas/UserBean'
        name:
          type: string
          description: The object name.
        pluginId:
          type: string
          description: The plugin id
        requiredPermission:
          type: string
          description: The required permission for this executable
        tags:
          type: array
          description: The tags (i.e. labels).
          example: Address
          items:
            type: string
            description: The tags (i.e. labels).
            example: Address
        targetChannels:
          type: array
          description: The channels.
          items:
            $ref: '#/components/schemas/targetChannels'
  securitySchemes:
    oauth2:
      type: oauth2
      description: 'Authenticates a registered OAuth 2.0 client. The Authorization code flow and Client credentials flow are supported. Make sure to select the correct flow based on which flow the registered client supports. The client id and client secret can be found in BlueConic by opening the registered client under *Settings* > *Access management* > *Applications*.<br/>**NOTE:** When using the Authorization code flow, the redirect URL of the registered client in BlueConic must be set to `https://rest.apidoc.blueconic.com/oauth-receiver.html` and ''Send Proof Key for Code Exchange'' must be enabled.<br/><br/>To use a Bearer token for authentication, follow these steps: <br/>1. Acquire the token through authentication.<br/>2. Include the token in the request''s Authorization header as Bearer \<token\>.<br/>3. Send the request to access protected resources.<br/>4. Handle token expiration by refreshing or obtaining a new token.'
      flows:
        clientCredentials:
          tokenUrl: /rest/v2/oauth/token
        authorizationCode:
          authorizationUrl: /rest/v2/oauth/authorize
          tokenUrl: /rest/v2/oauth/token
          refreshUrl: /rest/v2/oauth/token
