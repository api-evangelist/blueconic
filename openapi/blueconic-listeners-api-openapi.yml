servers:
- url: https://{blueconicHostname}/rest/v2
  description: The BlueConic server
  variables:
    blueconicHostname:
      description: BlueConic server hostname, e.g. 'tenant.blueconic.net'
      default: tenantname
tags:
- name: Listeners
  description: Listeners add information about visitors to their profile, based on their online behavior or provided input. Use this endpoint to retrieve listener configuration. [Read more](https://support.blueconic.com/en/articles/247923-listeners-overview)
paths:
  /listeners:
    get:
      tags:
      - Listeners
      summary: Get all listeners
      description: Retrieves all listeners.
      operationId: getAllListeners
      parameters:
      - name: startIndex
        in: query
        description: Specifies the index of the first item to include in the result.
        schema:
          type: integer
          format: int64
          default: 0
          example: 0
      - name: count
        in: query
        description: Specifies the number of results to return.
        schema:
          type: integer
          format: int64
          default: 20
          example: 10
      responses:
        '200':
          description: Returns the listeners.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listener'
              examples:
                Response body:
                  description: Response body
                  value: "{\n  \"itemsPerPage\": 10,\n  \"listeners\": [\n    {\n      \"allChannels\": false,\n      \"creationDate\": \"2025-10-01T11:53:43.839Z\",\n      \"creator\": {\n        \"fullName\": \"ondemand@blueconic.com\",\n        \"userName\": \"ondemand@blueconic.com\"\n      },\n      \"description\": \"\",\n      \"domains\": [\n        {\n          \"id\": \"8d7757cf-9ed0-4807-b974-089ebc0197d0\",\n          \"name\": \"www.blueconic.test\"\n        }\n      ],\n      \"id\": \"28411027-a400-4c29-b962-bcb6910db736\",\n      \"isEnabled\": true,\n      \"lastModifiedDate\": \"2025-10-01T14:28:53.215Z\",\n      \"lastModifiedUser\": {\n        \"fullName\": \"ondemand@blueconic.com\",\n        \"userName\": \"ondemand@blueconic.com\"\n      },\n      \"lastActivationDate\": \"2025-11-27T10:35:43.034Z\",\n      \"name\": \"AdBlock Detection\",\n      \"pluginId\": \"listener_adblock\",\n      \"tags\": [],\n      \"targetChannels\": [\n        {\n          \"URLRestrictions\": [\n            {\n              \"pattern\": \"/tenant\",\n              \"previewURL\": \"\",\n              \"restrictionType\": \"RESTRICT\"\n            }\n          ],\n          \"channelId\": \"653d3db6-8016-46e8-96a5-547feceb9d15\"\n        }\n      ]\n    },\n    {\n      \"allChannels\": true,\n      \"creationDate\": \"2025-10-01T11:53:44.327Z\",\n      \"creator\": {\n        \"fullName\": \"ondemand@blueconic.com\",\n        \"userName\": \"ondemand@blueconic.com\"\n      },\n      \"description\": \"\",\n      \"domains\": [],\n      \"id\": \"efd56981-8c5d-4f2b-b897-fa86938254f8\",\n      \"isEnabled\": true,\n      \"lastModifiedDate\": \"2025-10-01T11:53:44.327Z\",\n      \"lastModifiedUser\": {\n        \"fullName\": \"ondemand@blueconic.com\",\n        \"userName\": \"ondemand@blueconic.com\"\n      },\n      \"name\": \"Campaign Tracker Listener\",\n      \"pluginId\": \"listener_campaign_tracker\",\n      \"tags\": [],\n      \"targetChannels\": []\n    },\n    {\n      \"allChannels\": true,\n      \"creationDate\": \"2025-10-01T11:53:44.595Z\",\n      \"creator\": {\n        \"fullName\": \"ondemand@blueconic.com\",\n        \"userName\": \"ondemand@blueconic.com\"\n      },\n      \"description\": \"\",\n      \"domains\": [],\n      \"id\": \"9eeb2c6d-52e0-496a-81e5-49c7457bfaf7\",\n      \"isEnabled\": true,\n      \"lastModifiedDate\": \"2025-10-01T11:53:44.595Z\",\n      \"lastModifiedUser\": {\n        \"fullName\": \"ondemand@blueconic.com\",\n        \"userName\": \"ondemand@blueconic.com\"\n      },\n      \"name\": \"Engagement Listener\",\n      \"pluginId\": \"listener_engagement\",\n      \"tags\": [],\n      \"targetChannels\": []\n    },\n    {\n      \"allChannels\": true,\n      \"creationDate\": \"2025-10-01T11:53:43.201Z\",\n      \"creator\": {\n        \"fullName\": \"ondemand@blueconic.com\",\n        \"userName\": \"ondemand@blueconic.com\"\n      },\n      \"description\": \"\",\n      \"domains\": [],\n      \"id\": \"9b4885b2-2e87-4941-993b-a2e8b70a788e\",\n      \"isEnabled\": true,\n      \"lastModifiedDate\": \"2025-10-01T11:53:43.201Z\",\n      \"lastModifiedUser\": {\n        \"fullName\": \"ondemand@blueconic.com\",\n        \"userName\": \"ondemand@blueconic.com\"\n      },\n      \"name\": \"Exit Intent\",\n      \"pluginId\": \"exitintent\",\n      \"tags\": [],\n      \"targetChannels\": []\n    },\n    {\n      \"allChannels\": true,\n      \"creationDate\": \"2025-10-01T11:53:44.832Z\",\n      \"creator\": {\n        \"fullName\": \"ondemand@blueconic.com\",\n        \"userName\": \"ondemand@blueconic.com\"\n      },\n      \"description\": \"\",\n      \"domains\": [],\n      \"id\": \"50a79c94-5f86-428f-b098-6f9a29d1ea9b\",\n      \"isEnabled\": true,\n      \"lastModifiedDate\": \"2025-10-01T11:53:44.832Z\",\n      \"lastModifiedUser\": {\n        \"fullName\": \"ondemand@blueconic.com\",\n        \"userName\": \"ondemand@blueconic.com\"\n      },\n      \"name\": \"Geoloc