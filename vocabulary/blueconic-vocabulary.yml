id: blueconic-vocabulary
name: BlueConic API Vocabulary
description: Domain vocabulary for the BlueConic Customer Data Platform REST API v2, covering profiles, segments, connections,
  lifecycle stages, and data activation concepts.
version: 1.0.0
provider: BlueConic
url: https://support.blueconic.com/en/articles/248008-overview-blueconic-rest-api
terms:
- term: Visitor Profile
  type: entity
  description: A unified record of a single customer or visitor containing all behavioral, demographic, and interaction data
    collected by BlueConic.
- term: Segment
  type: entity
  description: A dynamic or static grouping of visitor profiles based on defined criteria such as behavior, demographics,
    or lifecycle stage.
- term: Lifecycle Stage
  type: entity
  description: A defined phase in the customer journey used to categorize and advance visitor profiles through marketing or
    engagement funnels.
- term: Connection
  type: entity
  description: An integration with an external platform or service that imports or exports data to/from BlueConic visitor
    profiles.
- term: Dialogue
  type: entity
  description: A personalization campaign or content experience delivered to visitors based on segment membership and rules.
- term: Listener
  type: entity
  description: A tracking configuration that captures visitor events such as page views, clicks, or form submissions.
- term: Profile Property
  type: entity
  description: A named data attribute stored on a visitor profile, such as email address, age, or custom behavioral metric.
- term: Interaction
  type: entity
  description: A recorded engagement event between a visitor and BlueConic-powered content or personalization.
- term: Timeline Event
  type: entity
  description: A time-stamped event in a visitor profile history used for journey analysis and behavioral targeting.
- term: Recommendation
  type: entity
  description: A content or product suggestion generated by BlueConic machine learning models based on visitor profile data.
- term: Group
  type: entity
  description: A collection of visitor profiles organized by a shared group type for targeting or reporting purposes.
- term: Objective
  type: entity
  description: A measurable business goal tracked against visitor behavior within BlueConic.
- term: Notebook
  type: entity
  description: A BlueConic analytical workbook that runs data science and segmentation scripts against profile data.
- term: Audit Event
  type: entity
  description: A log entry capturing administrative or API actions taken within a BlueConic tenant for compliance and security.
- term: Content Store
  type: entity
  description: A repository of structured content items within BlueConic used for recommendation and personalization delivery.
- term: OAuth 2.0
  type: concept
  description: The authorization protocol used by the BlueConic REST API, supporting both authorization code flow and client
    credentials flow.
- term: Client Credentials Flow
  type: concept
  description: Machine-to-machine OAuth 2.0 authorization using a client ID and secret without user interaction.
- term: Authorization Code Flow
  type: concept
  description: User-delegated OAuth 2.0 authorization requiring user login and consent to grant API access.
- term: Tenant
  type: concept
  description: A BlueConic customer environment identified by a subdomain (tenantname.blueconic.net) that hosts all customer
    data and configurations.
- term: First-Party Data
  type: concept
  description: Customer data collected directly from visitor interactions, stored in BlueConic profiles without third-party
    intermediaries.
- term: CDP
  type: concept
  description: Customer Data Platform — the category of software BlueConic represents, unifying customer data for activation.
- term: Data Activation
  type: concept
  description: The process of using unified profile data to personalize experiences and trigger downstream actions in connected
    systems.
- term: Audit Events
  type: resource-category
  description: "The Audit Event API allows users to connect BlueConic to a SIEM system. We recommend using this API to periodically\
    \ receive security-related activities based on a rolling window. The API has a 30-day retention period.\n\nThe API logs\
    \ the following audit events:\n\n| Object                     | Events                                               \
    \                                          |\n|:---------------------------|:-----------------------------------------------------------------------------------------------|\n\
    | BlueConic hostname         | Create, Update, Delete                                                                \
    \         |\n| BlueConic Support Access   | Update (for each change)                                                 \
    \                      |\n| Channel                    | Create, Update, Delete                                      \
    \                                   |\n| Clean up rule              | Create, Update, Delete                         \
    \                                                |\n| Connection                 | Create, Update, Delete, Manual run,\
    \ Scheduled run                                              |\n| Dashboard                  | Create, Update, Delete\
    \                                                                         |\n| Dialogue                   | Create, Update,\
    \ Delete                                                                         |\n| Domain Group               | Create,\
    \ Update, Delete                                                                         |\n| Gen AI Setting         \
    \    | Update (for each change)                                                                       |\n| Group     \
    \                 | Read, Update, Delete                                                                           |\n\
    | Group type                 | Create, Update, Delete                                                                \
    \         |\n| Ip range                   | Create, Update, Delete                                                   \
    \                      |\n| Language                   | Create, Update, Delete                                      \
    \                                   |\n| Lifecycle                  | Create, Update, Delete                         \
    \                                                |\n| Merge rule                 | Create, Update, Delete            \
    \                                                             |\n| Models                     | Create, Update, Delete\
    \                                                                         |\n| Notebook                   | Create, Update,\
    \ Delete, Manual run, Scheduled run, Editor run                                  |\n| OAuth application          | Create,\
    \ Update, Delete                                                                         |\n| OAuth token            \
    \    | Create, Update, Delete                                                                         |\n| Objective \
    \                 | Create, Update, Delete                                                                         |\n\
    | Plugin                     | Create, Update, Delete                                                                \
    \         |\n| Privacy setting            | Update (for each change)                                                 \
    \                      |\n| Profile                    | Read, Update, Delete                                        \
    \                                   |\n| Profile property           | Create, Update, Delete                         \
    \                                                |\n| Role                       | Create, Update, Delete            \
    \                                                             |\n| Segment                    | Create, Update, Delete\
    \                                                                         |\n| Single Sign On Setting     | Update (for\
    \ each change)                                                                       |\n| Inactvity Setting          |\
    \ Update (for each change)                                                                       |\n| Supported Legislation\
    \ Zone | Create, Delete, Update                                                                         |\n| Timeline\
    \ Event Rollup      | Create, Update, Delete                                                                         |\n\
    | Timeline Event Type        | Create, Update, Delete                                                                \
    \         |\n| Tracker                    | Create, Update, Delete                                                   \
    \                      |\n| User                       | Login, Login failed, Logout, Create, Update, Delete, Password\
    \ reset requested, Password change |\n\n\nOnly Profile and Group viewed, updated, or deleted by a user from the Profile\
    \ and Groups tab are logged.\n\nThe following events are not considered as human actions, and therefore not covered in\
    \ the Platform\nAudit Event API:\n\n- Connections that import or export profiles.\n- Profile and group creation (Profiles\
    \ can only be created by a visitor or an import connection).\n\n**Event data**\n\nThe following event data is available:\n\
    \n| Field                  | Description      | Example values                                                       \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                  |\n| :---                   | :---             |:-----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
    |date|Datetime in UTC when the event occurred. The date is in the https://www.ietf.org/rfc/rfc3339.txt format.| 2025-04-15T11:24:01.183Z\
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                               |\n|username|(BlueConic) Identifier (email address) of\
    \ the user who did the action.<br /><br />Value is empty for failed login attempts.| test@blueconic.com              \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                       |\n|objectType|Object of the action.| <ul><li>BLUECONIC_HOSTNAME</li><li>BLUECONIC_SUPPORT_ACCESS_SETTING</li><li>CHANNEL</li><li>CLEAN_UP_RULE</li><li>CONNECTION</li><li>DASHBOARD</li><li>DIALOGUE</li><li>DOMAIN_GROUP</li><li>GEN_AI_SETTING</li><li>GROUP</li><li>GROUP_TYPE</li><li>IP_RANGE</li><li>LANGUAGE</li><li>LIFECYCLE</li><li>LISTENER</li><li>MERGE_RULE</li><li>NOTEBOOK</li><li>OBJECTIVE</li><li>PLUGIN</li><li>PRIVACY_SETTING</li><li>PROFILE</li><li>PROFILE_PROPERTY</li><li>ROLE</li><li>SEGMENT</li><li>SINGLE_SIGN_ON_SETTING</li><li>SUPPORTED_LEGISLATION_ZONE</li><li>TRACKER</li><li>USER</li></ul>\
    \ |\n|objectId|<ul><li>Email address in case of a user. <ul><li>In the case of LOGIN_FAILED and a user tried to login\
    \ with an invalid format email address, it could be that the user filled the password in the email address field. In that\
    \ case the objectId is empty</li></ul></li><li>Grouptype_GroupID in case of a group</li><li> For PRIVACY_SETTING and SINGLE_SIGN_ON_SETTING,\
    \ the objectId is the name(s) of the changed setting. E.g. Status, Identity_Provider_Issuer_URL_Entity_ID.</li><li> For\
    \ BLUECONIC_SUPPORT_ACCESS_SETTING the objectID contains the new settings.<ul><li> `\"objects\" : [ {\"name\" : \"No Access\"\
    , \"id\" : \"none\" } ]` or </li><li>`\"objects\" : [ {\"name\" : \"User name here\", \"id\" : \"user1@blueconic.com\"\
    \ },{\"name\" : \"User name 2 here\", \"id\" : \"user2@blueconic.com\" }], (contains the new list)` or</li><li>`\"objects\"\
    \ : [ {\"name\" : \"All BlueConic support employees\", \"id\" : \"all\" } ],`</li></ul></li><li>UUID or identifier in\
    \ case of other object types.</li></ul>| <ul><li>1b1e50a5-c46a-4309-a95c-d4e19985fbbb</li><li>test@blueconic.com</li><li>test_objective</li><li>test_profile_property</li></ul>\
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                     |\n|objectName|<p>Human readable name of the object.</p><p>For\
    \ Profiles, the name is determined by the first value that is not empty:</p><ol><li>fullname</li><li>email</li><li>BlueConic\
    \ ID (UUID)</li></ol><p>For Users, the name is determined by the first value that is not empty:</p><ol><li>fullname</li><li>email</li></ol><ul><li>In\
    \ the case of LOGIN_FAILED and a user tried to login with an invalid format email address, it could be that the user filled\
    \ the password in the email address field. In that case, the objectName is empty.</li></ul><p>For groups, the name is\
    \ the group id.</p><p><span>For PRIVACY_SETTING and SINGLE_SIGN_ON_SETTING, the objectName is the name(s) of the changed\
    \ setting. E.g. Status, Identity_Provider_Issuer_URL_Entity_ID.</span></p><p>For BLUECONIC_SUPPORT_ACCESS_SETTING the\
    \ objectName contains the new settings.</p><ul><li><p>`\"objects\" : [ {\"name\" : \"No Access\", \"id\" : \"none\" }\
    \ ]` or</p></li><li ><p> `\"objects\" : [ {\"name\" : \"User name here\", \"id\" : \"user1@blueconic.com\" },{\"name\"\
    \ : \"User name 2 here\", \"id\" : \"user2@blueconic.com\" }],` (contains the new list) or</p></li><li><p>`\"objects\"\
    \ : [ {\"name\" : \"All BlueConic support employees\", \"id\" : \"all\" } ],`</p></li></ul>| <ul><li>SFTP connection</li><li>test@blueconic.om</li><li>Keyword\
    \ Interest Ranking</li>                                                                                              \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                      |\n|operation| Action performed on the object.                                                \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                     | <ul><li>CREATE</li><li>UPDATE</li><li>DELETE</li><li>EDITOR_RUN</li><li>READ</li><li>LOGIN</li><li>LOGIN_FAILED</li><li>LOGOUT</li><li>MANUAL_RUN</li><li>PASSWORD_RESET_REQUESTED</li><li>PASSWORD_CHANGE</li><li>SCHEDULED_RUN</li></ul>\
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                     \n|ipAddress| The source IP address\
    \ from which the event was triggered.                                                                                \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \           | 192.168.1.100                                                                                          \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                    |\n|application|\
    \ The application that performed the audit event operation.                                                          \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                  | blueconic                                                                       \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \                                                                                                                    \
    \       |\n\n"
- term: Stores
  type: resource-category
  description: A store is a database for managing metadata about products or articles. You can populate it using a Product
    collector or Content collector, which scrapes data from your website. This metadata powers features in the recommendation
    engine and AI Workbench. Use this endpoint to retrieve, create, update, or delete content and product stores, as well
    as the items within them. See [Content Stores](https://support.blueconic.com/en/articles/247526-data-storage-in-blueconic#h_588a2cba-7c4d-4bb4-a155-2cf6ee87db76).
- term: Connections
  type: resource-category
  description: BlueConic Connections lets you connect with other systems to synchronize customer data. The following methods
    allow you to retrieve the connection configuration and run history.  [Read more](https://support.blueconic.com/hc/en-us/articles/202532092-Synchronizing-your-data-with-Connections?utm_source=BlueConic_User)
- term: Dialogues
  type: resource-category
  description: A Dialogue is an online (personalized) conversation with a visitor to a channel. [Read more](https://support.blueconic.com/hc/en-us/articles/200456521-What-are-dialogues-)
- term: Listeners
  type: resource-category
  description: Listeners add information about visitors to their profile, based on their online behavior or provided input.
    Use this endpoint to retrieve listener configuration. [Read more](https://support.blueconic.com/en/articles/247923-listeners-overview)
- term: Plugins
  type: resource-category
  description: 'Retrieve plugins from the gallery, or limit results to installed plugins only. See [Plugins](https://support.blueconic.com/en/articles/248049-plugins-overview). '
- term: Channels
  type: resource-category
  description: The Channel API allows you to retrieve information about [channels in BlueConic](https://support.blueconic.com/hc/en-us/articles/200472632-Overview-What-are-channels-in-BlueConic).
- term: Interaction events
  type: resource-category
  description: Used to track an interaction (view, click, or conversion) with a BlueConic Dialogue. See [Tracking metrics
    for views, clicks, and conversions](https://support.blueconic.com/hc/en-us/articles/360020105614-Tracking-metrics-for-views-clicks-and-conversions).
- term: Interactions
  type: resource-category
  description: Get the interactions (i.e. listeners and/or dialogues) that must be executed for a given profile that visits
    a certain web page (for web channels), a screen (on mobile or CTV channels) or a campaign ID (for email channels). Read
    more about [Dialogues](https://support.blueconic.com/hc/en-us/articles/202425271-Dialogues-Overview) or [Listeners](https://support.blueconic.com/hc/en-us/articles/202531942-Listeners-Overview).
- term: Pageview events
  type: resource-category
  description: Pageview events are used to track page views by profiles. This is used by BlueConic Listeners. See [Listeners
    and Trackers](https://support.blueconic.com/hc/en-us/sections/200913331-Listeners-and-Trackers).
- term: Lifecycles
  type: resource-category
  description: 'The following methods allow you to retrieve information about lifecycles. See [Lifecycles](https://support.blueconic.com/en/articles/247909-lifecycles-overview). '
- term: Models
  type: resource-category
  description: 'The following methods allow you to create, modify, retrieve, and delete machine learning Models in ONNX format.
    See [Models](https://support.blueconic.com/en/articles/307965-real-time-models). '
- term: Objectives
  type: resource-category
  description: Objectives are used to group items needed for your marketing objectives. When consent is required, items in
    the objective only get access to profiles that have given consent to the objective. [Read more](https://support.blueconic.com/hc/en-us/articles/360002107054-Overview-Using-BlueConic-Objectives-for-privacy-and-consent?utm_source=BlueConic_User)
- term: Groups
  type: resource-category
  description: 'The following methods allow you to create, modify, retrieve, and delete BlueConic groups. To manage group
    properties, use the [Properties endpoints](https://rest.apidoc.blueconic.com/#tag--Properties).

    Best practice when updating groups is to use the bulk endpoint rather than a single request for each individual update.'
- term: Group Types
  type: resource-category
  description: Retrieve all types of groups, such as “Househould” or “Account”. Each group type has its own properties that
    can be used for segmentation. <a href="https://support.blueconic.com/hc/en-us/articles/360019531594-Creating-and-managing-groups">Read
    more</a>
- term: Profile events
  type: resource-category
  description: Consent management events for a profile; consent changed or permission level changed. [Read more about using
    Objectives for privacy and consent](https://support.blueconic.com/hc/en-us/articles/360002107054-Overview-Using-BlueConic-Objectives-for-privacy-and-consent).
- term: Properties
  type: resource-category
  description: The following methods allow you to retrieve and update [Profile Properties](https://support.blueconic.com/hc/en-us/articles/202608231-Capturing-customer-data-in-Profile-Properties)
    and [Group Properties](https://support.blueconic.com/en/articles/247630-creating-and-managing-groups#h_01HCX36VPVENES2WNHEYRHXB2S).
- term: Profiles
  type: resource-category
  description: The following methods allow you to create, modify, retrieve properties from, and delete [BlueConic Profiles](https://support.blueconic.com/hc/en-us/articles/115001671965-Overview-BlueConic-Profiles),
    as well as retrieve BlueConic segment information.
- term: Segments
  type: resource-category
  description: A segment is a group of profiles characterized by a defined set of attributes & properties. The following methods
    allow you to retrieve information from segments and the profiles within a given segment. [Read more](https://support.blueconic.com/hc/en-us/articles/202531952-Segments?utm_source=BlueConic_User)
- term: Timeline Event Types
  type: resource-category
  description: Timeline events store time-based data on events that occur for a profile, such as product orders or page views.
    In BlueConic, a Timeline event type defines how events are stored in a profile. For example, a Timeline event type for
    product orders might define event details such as the date, time, price, item URL, and item SKU. The following methods
    allow you to retrieve timeline event types. [Read more](https://support.blueconic.com/hc/en-us/articles/360035962954-About-Timeline-events-in-BlueConic?utm_source=BlueConic_User)
- term: Recommendations
  type: resource-category
  description: Generate individualized content and product recommendations for a given profile. [Read more](https://support.blueconic.com/hc/en-us/articles/115005971169-Overview-Content-and-Product-Recommendations).
    To work with recommendations, you have to set up a [content collector](https://support.blueconic.com/hc/en-us/articles/115003214945-Content-Collector)
    or a [product collector](https://support.blueconic.com/hc/en-us/articles/115003214685-Product-Collector).
- term: Reporting
  type: resource-category
  description: All reporting related endpoints.
- term: Timeline event rollups
  type: resource-category
  description: Roll up BlueConic timeline event data and store the results in a profile property. You can use that profile
    property for segmentation, reporting, and activation. [Read more](https://support.blueconic.com/en/articles/247617-using-timeline-event-rollups)
- term: URL mappings
  type: resource-category
  description: The following methods allow you to create, modify, and retrieve URL mappings (tracking pixel or shortened URL).
    These can be created via the External tracker tab, but can also be created as a separate object (not visible in the UI)
    via this REST API directly. You can use external trackers to track customer or visitor activity outside domains in your
    BlueConic tenant. [Read more](https://support.blueconic.com/hc/en-us/articles/202531862-External-Trackers).
- term: Roles
  type: resource-category
  description: A role contains a collection of data privacy and feature access permissions that you can assign to a user.
    Every BlueConic user is assigned to at least one role. A user can only access the features their role grants to them.
    [Read more](https://support.blueconic.com/hc/en-us/articles/202607121-BlueConic-Roles?utm_source=BlueConic_User)
- term: Users
  type: resource-category
  description: Users are the people who have access to the BlueConic environment. [Read more](https://support.blueconic.com/hc/en-us/articles/360000013785-Users)
- term: Notebooks
  type: resource-category
  description: The following methods allow you to retrieve AI Workbench notebooks and their run history. See [AI Workbench
    Overview](https://support.blueconic.com/en/articles/247838-ai-workbench-overview).
