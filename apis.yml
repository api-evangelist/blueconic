    name: BlueConic REST API v2
    description: The BlueConic REST API v2 provides access to visitor profiles, segments,
      interactions, and audit events. It uses OAuth 2.0 for authorization and follows
      the OpenAPI specification, supporting both client credentials and authorization
      code flows. JSON is the only supported format.
    humanURL: https://support.blueconic.com/en/articles/248008-overview-blueconic-rest-api
